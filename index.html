<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>极简工作看板 · 策划｜美术｜程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #111111;
            padding: 2rem 1.5rem;
            line-height: 1.4;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* 角色切换栏 */
        .role-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 0.5rem;
        }

        .role-tab {
            background: none;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: #666;
            border-radius: 40px;
            transition: 0.2s;
        }

        .role-tab:hover {
            background: #f0f0f0;
            color: #000;
        }

        .role-tab.active {
            background: #000000;
            color: white;
        }

        .header {
            border-bottom: 2px solid #000000;
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #000000;
            margin-bottom: 0.25rem;
        }

        .title-section p {
            font-size: 0.85rem;
            color: #444444;
        }

        .stats {
            background: #f5f5f5;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1a1a1a;
            border: 1px solid #e0e0e0;
        }

        .add-section {
            background: #fafafa;
            border: 1px solid #dddddd;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 20px;
        }

        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-field {
            flex: 2;
            min-width: 180px;
        }

        .input-field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #333;
            margin-bottom: 0.4rem;
        }

        .input-field input, .input-field textarea {
            width: 100%;
            border: 1px solid #cccccc;
            background: #ffffff;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            border-radius: 14px;
            font-family: inherit;
            transition: 0.2s;
            resize: vertical;
        }

        .input-field input:focus, .input-field textarea:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
        }

        .btn-submit {
            background: #000000;
            border: none;
            color: white;
            padding: 0.75rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #2c2c2c;
            transform: scale(0.97);
        }

        .board-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .board-column {
            flex: 1;
            min-width: 260px;
            background: #ffffff;
            border: 1px solid #e6e6e6;
            border-radius: 24px;
            padding: 1rem 1rem 1.5rem 1rem;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #000000;
            padding-bottom: 0.65rem;
            margin-bottom: 1.25rem;
            font-weight: 600;
        }

        .column-header h3 {
            font-size: 1rem;
            letter-spacing: -0.2px;
            color: #000;
        }

        .badge-count {
            background: #f0f0f0;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-height: 300px;
        }

        .task-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 18px;
            padding: 0.9rem;
            transition: 0.1s;
        }

        .task-card:hover {
            border-color: #aaaaaa;
        }

        .task-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .task-desc {
            font-size: 0.7rem;
            color: #4b4b4b;
            margin-bottom: 0.6rem;
            border-left: 2px solid #d0d0d0;
            padding-left: 8px;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.65rem;
            color: #777;
            border-top: 1px solid #efefef;
            padding-top: 0.6rem;
        }

        .task-date {
            font-family: monospace;
        }

        .mark-done-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
        }

        .mark-done-btn:hover {
            background: #000;
            color: white;
            border-color: #000;
        }

        .delete-task {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #999;
            padding: 0 4px;
        }

        .delete-task:hover {
            color: #000;
        }

        .empty-state {
            text-align: center;
            padding: 1.5rem 0.5rem;
            color: #aaa;
            font-size: 0.75rem;
            border: 1px dashed #e2e2e2;
            border-radius: 16px;
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
        }

        @media (max-width: 780px) {
            body { padding: 1rem; }
            .board-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 角色切换 -->
    <div class="role-tabs">
        <button class="role-tab active" data-role="策划">🎮 策划</button>
        <button class="role-tab" data-role="美术">🎨 美术</button>
        <button class="role-tab" data-role="程序">💻 程序</button>
    </div>

    <div class="header">
        <div class="title-section">
            <h1>◼️ 任务闭环</h1>
            <p id="roleSubtitle">需求 → 待办 → 完成 · 黑白极简流</p>
        </div>
        <div class="stats" id="globalStats">0 个活跃任务</div>
    </div>

    <!-- 提交需求 -->
    <div class="add-section">
        <div class="form-grid">
            <div class="input-field" style="flex:2">
                <label>任务标题</label>
                <input type="text" id="taskTitleInput" placeholder="例如：完成角色原画设计" autocomplete="off">
            </div>
            <div class="input-field" style="flex:3">
                <label>简要描述</label>
                <textarea id="taskDescInput" rows="1" placeholder="补充说明…" style="height: 44px;"></textarea>
            </div>
            <button class="btn-submit" id="addDemandBtn">+ 提交需求 → 待办</button>
        </div>
    </div>

    <!-- 两栏看板 -->
    <div class="board-wrapper">
        <div class="board-column">
            <div class="column-header">
                <h3>📋 待办</h3>
                <span class="badge-count" id="todoCount">0</span>
            </div>
            <div class="task-list" id="todoList"></div>
        </div>
        <div class="board-column">
            <div class="column-header">
                <h3>✓ 已完成</h3>
                <span class="badge-count" id="doneCount">0</span>
            </div>
            <div class="task-list" id="doneList"></div>
        </div>
    </div>

    <footer>
        ⚫️⚪️ 策划 · 美术 · 程序 数据独立 · 自动记录提交日期
    </footer>
</div>

<script>
    // 当前角色: '策划', '美术', '程序'
    let currentRole = '策划';
    
    // 数据结构: { 策划: [], 美术: [], 程序: [] }
    let tasksDB = {
        策划: [],
        美术: [],
        程序: []
    };

    // 获取当前日期
    function getCurrentDate() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }

    // 加载数据
    function loadFromLocal() {
        const stored = localStorage.getItem('role_tasks_v3');
        if (stored) {
            const parsed = JSON.parse(stored);
            // 保证三个分支都存在
            tasksDB = {
                策划: parsed.策划 || [],
                美术: parsed.美术 || [],
                程序: parsed.程序 || []
            };
        } else {
            // 示例数据
            tasksDB = {
                策划: [
                    { id: 'p1', title: '设计春节活动方案', description: '产出活动文档', submitDate: '2026-05-25', status: 'todo' },
                    { id: 'p2', title: '配置掉落表', description: '核对数值', submitDate: '2026-05-26', status: 'done' }
                ],
                美术: [
                    { id: 'a1', title: '主角立绘精修', description: '完成三视图', submitDate: '2026-05-24', status: 'todo' }
                ],
                程序: [
                    { id: 'c1', title: '登录模块优化', description: '修复token过期问题', submitDate: '2026-05-23', status: 'done' }
                ]
            };
        }
    }

    function saveToLocal() {
        localStorage.setItem('role_tasks_v3', JSON.stringify(tasksDB));
    }

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).substring(2, 8);
    }

    // 获取当前角色的任务列表
    function getCurrentTasks() {
        return tasksDB[currentRole];
    }

    // 保存当前角色任务
    function setCurrentTasks(newTasks) {
        tasksDB[currentRole] = newTasks;
        saveToLocal();
    }

    // 添加需求
    function addDemand(title, description) {
        if (!title || title.trim() === "") {
            alert("请填写任务标题");
            return false;
        }
        const newTask = {
            id: generateId(),
            title: title.trim(),
            description: description ? description.trim() : "",
            submitDate: getCurrentDate(),
            status: "todo"
        };
        const currentTasks = getCurrentTasks();
        currentTasks.push(newTask);
        setCurrentTasks(currentTasks);
        renderAll();
        return true;
    }

    // 标记完成
    function markAsDone(taskId) {
        const tasks = getCurrentTasks();
        const task = tasks.find(t => t.id === taskId);
        if (task && task.status === 'todo') {
            task.status = 'done';
            setCurrentTasks(tasks);
            renderAll();
        }
    }

    // 撤销
    function reopenTask(taskId) {
        const tasks = getCurrentTasks();
        const task = tasks.find(t => t.id === taskId);
        if (task && task.status === 'done') {
            task.status = 'todo';
            setCurrentTasks(tasks);
            renderAll();
        }
    }

    // 删除
    function deleteTask(taskId) {
        let tasks = getCurrentTasks();
        tasks = tasks.filter(t => t.id !== taskId);
        setCurrentTasks(tasks);
        renderAll();
    }

    // 渲染当前角色
    function renderAll() {
        const tasks = getCurrentTasks();
        const todoTasks = tasks.filter(t => t.status === 'todo');
        const doneTasks = tasks.filter(t => t.status === 'done');

        document.getElementById('todoCount').innerText = todoTasks.length;
        document.getElementById('doneCount').innerText = doneTasks.length;
        document.getElementById('globalStats').innerHTML = `${todoTasks.length} 个待办 · ${doneTasks.length} 已完成`;

        const todoContainer = document.getElementById('todoList');
        const doneContainer = document.getElementById('doneList');
        todoContainer.innerHTML = '';
        doneContainer.innerHTML = '';

        if (todoTasks.length === 0) {
            todoContainer.innerHTML = '<div class="empty-state">⛁ 暂无待办任务</div>';
        } else {
            todoTasks.forEach(task => {
                todoContainer.appendChild(createTaskCard(task, 'todo'));
            });
        }

        if (doneTasks.length === 0) {
            doneContainer.innerHTML = '<div class="empty-state">◻️ 已完成的任务</div>';
        } else {
            doneTasks.forEach(task => {
                doneContainer.appendChild(createTaskCard(task, 'done'));
            });
        }
    }

    function createTaskCard(task, type) {
        const card = document.createElement('div');
        card.className = 'task-card';

        const title = document.createElement('div');
        title.className = 'task-title';
        title.innerText = task.title;
        card.appendChild(title);

        if (task.description) {
            const desc = document.createElement('div');
            desc.className = 'task-desc';
            desc.innerText = task.description.length > 70 ? task.description.slice(0,70)+'…' : task.description;
            card.appendChild(desc);
        }

        const meta = document.createElement('div');
        meta.className = 'task-meta';
        
        const dateSpan = document.createElement('span');
        dateSpan.className = 'task-date';
        dateSpan.innerText = `📅 ${task.submitDate}`;
        meta.appendChild(dateSpan);

        const actions = document.createElement('div');
        actions.style.display = 'flex';
        actions.style.gap = '8px';

        if (type === 'todo') {
            const doneBtn = document.createElement('button');
            doneBtn.innerText = '✓ 完成';
            doneBtn.className = 'mark-done-btn';
            doneBtn.onclick = (e) => {
                e.stopPropagation();
                markAsDone(task.id);
            };
            actions.appendChild(doneBtn);
        } else {
            const reopenBtn = document.createElement('button');
            reopenBtn.innerText = '↺ 撤销';
            reopenBtn.className = 'mark-done-btn';
            reopenBtn.onclick = (e) => {
                e.stopPropagation();
                reopenTask(task.id);
            };
            actions.appendChild(reopenBtn);
        }

        const delBtn = document.createElement('button');
        delBtn.innerText = '✕';
        delBtn.className = 'delete-task';
        delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteTask(task.id);
        };
        actions.appendChild(delBtn);

        meta.appendChild(actions);
        card.appendChild(meta);
        return card;
    }

    // 切换角色
    function switchRole(role) {
        currentRole = role;
        // 更新tab样式
        document.querySelectorAll('.role-tab').forEach(tab => {
            if (tab.getAttribute('data-role') === role) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
        // 更新副标题
        const subtitle = document.getElementById('roleSubtitle');
        subtitle.innerHTML = `【${role}】需求 → 待办 → 完成 · 黑白极简流`;
        renderAll();
    }

    function clearForm() {
        document.getElementById('taskTitleInput').value = '';
        document.getElementById('taskDescInput').value = '';
    }

    function bindEvents() {
        // 角色切换
        document.querySelectorAll('.role-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const role = tab.getAttribute('data-role');
                switchRole(role);
            });
        });

        // 添加任务
        const addBtn = document.getElementById('addDemandBtn');
        const titleInput = document.getElementById('taskTitleInput');
        const descInput = document.getElementById('taskDescInput');

        addBtn.addEventListener('click', () => {
            const success = addDemand(titleInput.value, descInput.value);
            if (success) {
                clearForm();
                titleInput.focus();
            }
        });

        [titleInput, descInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addBtn.click();
                }
            });
        });
    }

    function init() {
        loadFromLocal();
        bindEvents();
        switchRole('策划');  // 默认显示策划
    }

    init();
</script>
</body>
</html>
