<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>极简工作看板 · 策划｜美术｜程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #111111;
            padding: 2rem 1.5rem;
            line-height: 1.4;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        .role-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .role-tab {
            background: none;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: #666;
            border-radius: 40px;
            transition: 0.2s;
        }

        .role-tab:hover {
            background: #f0f0f0;
            color: #000;
        }

        .role-tab.active {
            background: #000000;
            color: white;
        }

        .header {
            border-bottom: 2px solid #000000;
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #000000;
            margin-bottom: 0.25rem;
        }

        .title-section p {
            font-size: 0.85rem;
            color: #444444;
        }

        .stats {
            background: #f5f5f5;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1a1a1a;
            border: 1px solid #e0e0e0;
        }

        .refresh-btn {
            background: #ffffff;
            border: 1px solid #cccccc;
            color: #333;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 0.5rem;
        }

        .refresh-btn:hover {
            background: #f0f0f0;
            border-color: #000;
        }

        .add-section {
            background: #fafafa;
            border: 1px solid #dddddd;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border-radius: 20px;
        }

        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-field {
            flex: 2;
            min-width: 180px;
        }

        .input-field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #333;
            margin-bottom: 0.4rem;
        }

        .input-field input, .input-field textarea, .input-field select {
            width: 100%;
            border: 1px solid #cccccc;
            background: #ffffff;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            border-radius: 14px;
            font-family: inherit;
            transition: 0.2s;
            resize: vertical;
        }

        .input-field input:focus, .input-field textarea:focus, .input-field select:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
        }

        .btn-submit {
            background: #000000;
            border: none;
            color: white;
            padding: 0.75rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #2c2c2c;
            transform: scale(0.97);
        }

        .board-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .board-column {
            flex: 1;
            min-width: 260px;
            background: #ffffff;
            border: 1px solid #e6e6e6;
            border-radius: 24px;
            padding: 1rem 1rem 1.5rem 1rem;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 2px solid #000000;
            padding-bottom: 0.65rem;
            margin-bottom: 1.25rem;
            font-weight: 600;
        }

        .column-header h3 {
            font-size: 1rem;
            letter-spacing: -0.2px;
            color: #000;
        }

        .badge-count {
            background: #f0f0f0;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-height: 300px;
        }

        .task-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 18px;
            padding: 0.9rem;
            transition: 0.1s;
        }

        .task-card:hover {
            border-color: #aaaaaa;
        }

        .task-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .task-desc {
            font-size: 0.7rem;
            color: #4b4b4b;
            margin-bottom: 0.6rem;
            border-left: 2px solid #d0d0d0;
            padding-left: 8px;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.65rem;
            color: #777;
            border-top: 1px solid #efefef;
            padding-top: 0.6rem;
        }

        .task-date {
            font-family: monospace;
        }

        .mark-done-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
        }

        .mark-done-btn:hover {
            background: #000;
            color: white;
            border-color: #000;
        }

        .delete-task {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #999;
            padding: 0 4px;
        }

        .delete-task:hover {
            color: #000;
        }

        .empty-state {
            text-align: center;
            padding: 1.5rem 0.5rem;
            color: #aaa;
            font-size: 0.75rem;
            border: 1px dashed #e2e2e2;
            border-radius: 16px;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 1.5rem;
        }

        @media (max-width: 780px) {
            body { padding: 1rem; }
            .board-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="role-tabs">
        <button class="role-tab active" data-role="策划">🎮 策划</button>
        <button class="role-tab" data-role="美术">🎨 美术</button>
        <button class="role-tab" data-role="程序">💻 程序</button>
    </div>

    <div class="header">
        <div class="title-section">
            <h1>◼️ 任务闭环</h1>
            <p id="roleSubtitle">SeaTable 云端存储 · 实时同步</p>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <div class="stats" id="globalStats">加载中...</div>
            <button class="refresh-btn" id="refreshBtn">🔄 刷新</button>
        </div>
    </div>

    <div class="add-section">
        <div class="form-grid">
            <div class="input-field" style="flex:2">
                <label>任务标题</label>
                <input type="text" id="taskTitleInput" placeholder="例如：完成角色原画设计" autocomplete="off">
            </div>
            <div class="input-field" style="flex:3">
                <label>简要描述</label>
                <textarea id="taskDescInput" rows="1" placeholder="补充说明…" style="height: 44px;"></textarea>
            </div>
            <div class="input-field" style="flex:1">
                <label>角色</label>
                <select id="taskRoleSelect">
                    <option value="策划">策划</option>
                    <option value="美术">美术</option>
                    <option value="程序">程序</option>
                </select>
            </div>
            <button class="btn-submit" id="addDemandBtn">+ 提交需求 → 待办</button>
        </div>
    </div>

    <div class="board-wrapper">
        <div class="board-column">
            <div class="column-header">
                <h3>📋 待办</h3>
                <span class="badge-count" id="todoCount">0</span>
            </div>
            <div class="task-list" id="todoList"></div>
        </div>
        <div class="board-column">
            <div class="column-header">
                <h3>✓ 已完成</h3>
                <span class="badge-count" id="doneCount">0</span>
            </div>
            <div class="task-list" id="doneList"></div>
        </div>
    </div>

    <footer>
        ⚫️⚪️ 数据实时同步到 SeaTable · 所有人看到同一份任务清单
    </footer>
</div>

<script>
    // ========== SeaTable 配置 ==========
    // 请替换成你的信息
    const SEATABLE_CONFIG = {
        server: 'https://cloud.seatable.cn',
        apiToken: '89b7226a830c9fb7ddfa08200409c7a587b5e153',      // 替换成你的 API Token
        tableUUID: 'd464007f-d6af-47bd-b1d7-8ee843a308b6',      // 替换成你的表格 UUID
        tableName: 'jike_todolist'              // 你的表格名称
    };
    
    // 列名映射（根据你的表格列名调整）
    const COLUMNS = {
        title: '标题',
        description: '描述',
        role: '角色',
        status: '状态',
        date: '提交日期'
    };
    
    // ========== 全局变量 ==========
    let currentRole = '策划';
    let allTasks = [];
    let currentAccessToken = null;
    let dtableServer = null;
    
    // ========== SeaTable API 调用 ==========
    async function getAccessToken() {
        const url = `${SEATABLE_CONFIG.server}/api/v2.1/dtable/app-access-token/`;
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'Authorization': `Token ${SEATABLE_CONFIG.apiToken}`,
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            throw new Error(`获取 token 失败: ${response.status}`);
        }
        
        const data = await response.json();
        currentAccessToken = data.access_token;
        dtableServer = data.dtable_server;
        return { access_token: data.access_token, dtable_server: data.dtable_server };
    }
    
    async function loadTasksFromSeaTable() {
        try {
            // 获取 access token
            if (!currentAccessToken) {
                await getAccessToken();
            }
            
            // 读取表格数据
            const url = `${dtableServer}/api/v1/dtables/${SEATABLE_CONFIG.tableUUID}/rows/?table_name=${SEATABLE_CONFIG.tableName}`;
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${currentAccessToken}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error(`读取数据失败: ${response.status}`);
            }
            
            const data = await response.json();
            
            // 转换 SeaTable 数据格式
            allTasks = data.rows.map(row => ({
                _id: row._id,
                title: row[COLUMNS.title] || '',
                description: row[COLUMNS.description] || '',
                role: row[COLUMNS.role] || '',
                status: row[COLUMNS.status] === 'done' ? 'done' : 'todo',
                submitDate: row[COLUMNS.date] || getCurrentDate()
            }));
            
            renderAll();
            return true;
        } catch (error) {
            console.error('加载任务失败:', error);
            document.getElementById('globalStats').innerHTML = '加载失败，请刷新重试';
            return false;
        }
    }
    
    async function addTaskToSeaTable(title, description, role) {
        try {
            if (!currentAccessToken) {
                await getAccessToken();
            }
            
            const newRow = {
                table_name: SEATABLE_CONFIG.tableName,
                row: {
                    [COLUMNS.title]: title,
                    [COLUMNS.description]: description,
                    [COLUMNS.role]: role,
                    [COLUMNS.status]: 'todo',
                    [COLUMNS.date]: getCurrentDate()
                }
            };
            
            const url = `${dtableServer}/api/v1/dtables/${SEATABLE_CONFIG.tableUUID}/rows/`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentAccessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(newRow)
            });
            
            if (!response.ok) {
                throw new Error(`添加任务失败: ${response.status}`);
            }
            
            // 重新加载数据
            await loadTasksFromSeaTable();
            return true;
        } catch (error) {
            console.error('添加任务失败:', error);
            alert('添加任务失败，请重试');
            return false;
        }
    }
    
    async function updateTaskStatus(taskId, newStatus) {
        try {
            if (!currentAccessToken) {
                await getAccessToken();
            }
            
            const updateData = {
                table_name: SEATABLE_CONFIG.tableName,
                row_id: taskId,
                row: {
                    [COLUMNS.status]: newStatus
                }
            };
            
            const url = `${dtableServer}/api/v1/dtables/${SEATABLE_CONFIG.tableUUID}/rows/`;
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${currentAccessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updateData)
            });
            
            if (!response.ok) {
                throw new Error(`更新状态失败: ${response.status}`);
            }
            
            await loadTasksFromSeaTable();
            return true;
        } catch (error) {
            console.error('更新状态失败:', error);
            alert('更新失败，请重试');
            return false;
        }
    }
    
    async function deleteTaskFromSeaTable(taskId) {
        try {
            if (!currentAccessToken) {
                await getAccessToken();
            }
            
            const url = `${dtableServer}/api/v1/dtables/${SEATABLE_CONFIG.tableUUID}/rows/${taskId}/?table_name=${SEATABLE_CONFIG.tableName}`;
            const response = await fetch(url, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${currentAccessToken}`,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error(`删除任务失败: ${response.status}`);
            }
            
            await loadTasksFromSeaTable();
            return true;
        } catch (error) {
            console.error('删除任务失败:', error);
            alert('删除失败，请重试');
            return false;
        }
    }
    
    // ========== 辅助函数 ==========
    function getCurrentDate() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }
    
    // ========== 渲染函数 ==========
    function renderAll() {
        const roleTasks = allTasks.filter(t => t.role === currentRole);
        const todoTasks = roleTasks.filter(t => t.status === 'todo');
        const doneTasks = roleTasks.filter(t => t.status === 'done');
        
        document.getElementById('todoCount').innerText = todoTasks.length;
        document.getElementById('doneCount').innerText = doneTasks.length;
        document.getElementById('globalStats').innerHTML = `${todoTasks.length} 个待办 · ${doneTasks.length} 已完成`;
        
        const todoContainer = document.getElementById('todoList');
        const doneContainer = document.getElementById('doneList');
        todoContainer.innerHTML = '';
        doneContainer.innerHTML = '';
        
        if (todoTasks.length === 0) {
            todoContainer.innerHTML = '<div class="empty-state">⛁ 暂无待办任务</div>';
        } else {
            todoTasks.forEach(task => {
                todoContainer.appendChild(createTaskCard(task, 'todo'));
            });
        }
        
        if (doneTasks.length === 0) {
            doneContainer.innerHTML = '<div class="empty-state">◻️ 已完成的任务</div>';
        } else {
            doneTasks.forEach(task => {
                doneContainer.appendChild(createTaskCard(task, 'done'));
            });
        }
    }
    
    function createTaskCard(task, type) {
        const card = document.createElement('div');
        card.className = 'task-card';
        
        const title = document.createElement('div');
        title.className = 'task-title';
        title.innerText = task.title;
        card.appendChild(title);
        
        if (task.description) {
            const desc = document.createElement('div');
            desc.className = 'task-desc';
            desc.innerText = task.description.length > 70 ? task.description.slice(0,70)+'…' : task.description;
            card.appendChild(desc);
        }
        
        const meta = document.createElement('div');
        meta.className = 'task-meta';
        
        const dateSpan = document.createElement('span');
        dateSpan.className = 'task-date';
        dateSpan.innerText = `📅 ${task.submitDate}`;
        meta.appendChild(dateSpan);
        
        const actions = document.createElement('div');
        actions.style.display = 'flex';
        actions.style.gap = '8px';
        
        if (type === 'todo') {
            const doneBtn = document.createElement('button');
            doneBtn.innerText = '✓ 完成';
            doneBtn.className = 'mark-done-btn';
            doneBtn.onclick = async (e) => {
                e.stopPropagation();
                await updateTaskStatus(task._id, 'done');
            };
            actions.appendChild(doneBtn);
        } else {
            const reopenBtn = document.createElement('button');
            reopenBtn.innerText = '↺ 撤销';
            reopenBtn.className = 'mark-done-btn';
            reopenBtn.onclick = async (e) => {
                e.stopPropagation();
                await updateTaskStatus(task._id, 'todo');
            };
            actions.appendChild(reopenBtn);
        }
        
        const delBtn = document.createElement('button');
        delBtn.innerText = '✕';
        delBtn.className = 'delete-task';
        delBtn.onclick = async (e) => {
            e.stopPropagation();
            if (confirm('确定删除这个任务吗？')) {
                await deleteTaskFromSeaTable(task._id);
            }
        };
        actions.appendChild(delBtn);
        
        meta.appendChild(actions);
        card.appendChild(meta);
        return card;
    }
    
    function switchRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-tab').forEach(tab => {
            if (tab.getAttribute('data-role') === role) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
        document.getElementById('roleSubtitle').innerHTML = `【${role}】SeaTable 云端同步`;
        renderAll();
    }
    
    function clearForm() {
        document.getElementById('taskTitleInput').value = '';
        document.getElementById('taskDescInput').value = '';
        document.getElementById('taskRoleSelect').value = '策划';
    }
    
    function bindEvents() {
        document.querySelectorAll('.role-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                switchRole(tab.getAttribute('data-role'));
            });
        });
        
        document.getElementById('refreshBtn').addEventListener('click', async () => {
            await loadTasksFromSeaTable();
        });
        
        const addBtn = document.getElementById('addDemandBtn');
        const titleInput = document.getElementById('taskTitleInput');
        const descInput = document.getElementById('taskDescInput');
        const roleSelect = document.getElementById('taskRoleSelect');
        
        addBtn.addEventListener('click', async () => {
            const title = titleInput.value.trim();
            const description = descInput.value.trim();
            const role = roleSelect.value;
            
            if (!title) {
                alert('请填写任务标题');
                return;
            }
            
            await addTaskToSeaTable(title, description, role);
            clearForm();
            titleInput.focus();
        });
        
        [titleInput, descInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addBtn.click();
                }
            });
        });
    }
    
    async function init() {
        bindEvents();
        await loadTasksFromSeaTable();
    }
    
    init();
</script>
</body>
</html>
